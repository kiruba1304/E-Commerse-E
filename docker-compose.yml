version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5500:5500"
    env_file:
      - ./backend/.env
    volumes:
      - backend_uploads:/app/uploads
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - BACKEND_URL=http://backend:5500
    depends_on:
      - backend
    restart: always

volumes:
  backend_uploads:
